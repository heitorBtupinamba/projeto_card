<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{
            background: linear-gradient(-45deg, rgb(255,249,249),#000080,	#87CEEB);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: aliceblue;
        }
        @keyframes gradientBG{
            0%{background-position: 0% 50%;}
            50%{background-position: 100% 50%;}
            100%{background-position: 0% 50%;}
        }

        .card{
            background-color: #003153;
            padding: 20px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }

        .imgperfil{
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid white;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2{
            margin: 10px 0 5px;
            font-size: 25px;
        }

        .local{
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .job{
            font-size: 16px;
            line-height: 1.5;
        }

        .botoes{
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn{
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid rgb(0, 0, 0);
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
            color: black;
            text-decoration: none;
            background-color: white;
        
        }

        .btn:hover{
            opacity: 0.8;
            background: #9cc1eb;
        }

        .skills{
            margin-top: 16px;
            text-align: left;
        }

        .skills h3{
            font-size: 20px;
            margin-bottom: 10px;
        }

        .tags{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag{
            border: 1px solid aliceblue;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .social-media{
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
        }

        .social-media i{
            cursor: pointer;
            transition: 0.3s;
        }

        .social-media a{
            text-decoration: none;
            color: white;
        }

        .social-media i:hover{
            color: #9cc1eb;
            transform: scale(1.2);
        }

    </style>
</head>

<body>
    <div class="card">
        <img src="caricatura2.png" alt="Foto de Perfil" class="imgperfil">
        <h2>Heitor Antônio Botelho</h2>
        <div class="local">Montes Claros - MG</div>
        <div class="job">Técnico em Informática <br>Suporte de Redes e Sistemas</div>

        <div class="botoes">
            <a href="https://wa.me/5538988067237?textOlá,%20vim%20pelo%card." target="_blank" class="btn primario">Mensagem</a>
            <a href="https://br.linkedin.com/in/heitor-ant%C3%B4nio-botelho-47215523a" target="_blank" class="btn secundario">Follow</a>
        </div>

        <div class="skills">
            <h3>Habilidades:</h3>
            <div class="tags">
                <span class="tag">Hardware</span>
                <span class="tag">Redes</span>
                <span class="tag">Comunicação</span>
                <span class="tag">VPN</span>
                <span class="tag">Python</span>
                <span class="tag">Banco de Dados</span>
            </div>
        </div>

        <div class="social-media">
            <a href="https://github.com/heitorBtupinamba" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://br.linkedin.com/in/heitor-ant%C3%B4nio-botelho-47215523a" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://wa.me/5538988067237?textOlá,%20vim%20pelo%card." target="_blank"><i class="fab fa-whatsapp"></i> </a>      
        </div>

    </div>
</body>
</html>
